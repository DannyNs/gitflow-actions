name: Branch Cleanup

on:
  pull_request:
    types: [closed]
  workflow_call:

permissions:
  contents: write

jobs:
  delete-branch:
    name: Delete Merged Branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Delete head branch
        env:
          BRANCH: ${{ github.head_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Safety: never delete main or develop
          if [[ "$BRANCH" == "main" || "$BRANCH" == "develop" ]]; then
            echo "Skipping deletion of protected branch '$BRANCH'."
            exit 0
          fi

          # Safety: skip fork PRs
          if [[ "$HEAD_REPO" != "$REPO" ]]; then
            echo "Skipping deletion — branch is from a fork."
            exit 0
          fi

          # Safety: validate branch name matches expected Gitflow patterns
          if [[ ! "$BRANCH" =~ ^(feature|release|hotfix|merge)/ ]]; then
            echo "Skipping deletion — branch '$BRANCH' does not match a Gitflow pattern."
            exit 0
          fi

          echo "Deleting branch '$BRANCH'..."
          gh api -X DELETE "repos/$REPO/git/refs/heads/$BRANCH" || echo "Branch '$BRANCH' may have already been deleted."
