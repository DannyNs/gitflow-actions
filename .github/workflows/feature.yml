name: Feature Branch CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - develop
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Feature Branch
    runs-on: ubuntu-latest
    outputs:
      is_feature: ${{ steps.check.outputs.is_feature }}
    steps:
      - name: Check source branch
        id: check
        env:
          SOURCE: ${{ github.head_ref }}
        run: |
          if [[ "$SOURCE" != feature/* ]]; then
            echo "::notice::Source branch '$SOURCE' is not a feature branch. Skipping feature CI."
            echo "is_feature=false" >> "$GITHUB_OUTPUT"
          else
            echo "Feature branch '$SOURCE' validated."
            echo "is_feature=true" >> "$GITHUB_OUTPUT"
          fi

  checks:
    name: Run Checks
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Skip non-feature branches
        if: needs.validate.outputs.is_feature != 'true'
        run: echo "Not a feature branch — skipping CI checks."

      - name: Checkout code
        if: needs.validate.outputs.is_feature == 'true'
        uses: actions/checkout@v4

      - name: Placeholder - Add your build/test/lint steps here
        if: needs.validate.outputs.is_feature == 'true'
        run: |
          echo "==========================================="
          echo "  Add your CI steps to this job."
          echo ""
          echo "  Examples:"
          echo "    - npm ci && npm test"
          echo "    - cargo build && cargo test"
          echo "    - go build ./... && go test ./..."
          echo "==========================================="
