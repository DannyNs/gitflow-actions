          echo "==========================================="
          echo "  Add your CI steps to this job."
          echo ""
          echo "  Examples:"
          echo "    - npm ci && npm test"
          echo "    - cargo build && cargo test"
          echo "    - go build ./... && go test ./..."
          echo "==========================================="
